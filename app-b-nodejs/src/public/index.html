<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Unit Converter - SIT707 (Node.js)</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 620px; margin: 50px auto; padding: 0 20px; background: #f5f5f5; }
    .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
    h1 { color: #333; margin-bottom: 5px; }
    p.meta { color: #888; font-size: .85em; margin-top: 0; }
    .form-group { margin-bottom: 16px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
    input, select { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 1em; }
    button { background: #2196F3; color: white; padding: 10px 24px; border: none; cursor: pointer; border-radius: 4px; font-size: 1em; }
    button:hover { background: #1565C0; }
    #result { background: #e3f2fd; padding: 16px; margin-top: 20px; border-radius: 4px; border-left: 4px solid #2196F3; display: none; }
    #error  { background: #ffebee; padding: 16px; margin-top: 20px; border-radius: 4px; border-left: 4px solid #e53935; color: #c62828; display: none; }
  </style>
</head>
<body>
<div class="card">
  <h1>Unit Converter</h1>
  <p class="meta">Student ID: 223983938 | SIT707 Task 7.2H (App B - Node.js / Refactor Stage)</p>

  <form id="converterForm">
    <div class="form-group">
      <label for="direction">Conversion</label>
      <select id="direction" name="direction">
        <optgroup label="Length">
          <option value="mToF">Meters &rarr; Feet</option>
          <option value="fToM">Feet &rarr; Meters</option>
          <option value="kmToMi">Kilometers &rarr; Miles</option>
          <option value="miToKm">Miles &rarr; Kilometers</option>
          <option value="cmToIn">Centimeters &rarr; Inches</option>
          <option value="inToCm">Inches &rarr; Centimeters</option>
        </optgroup>
        <optgroup label="Weight">
          <option value="kgToLb">Kilograms &rarr; Pounds</option>
          <option value="lbToKg">Pounds &rarr; Kilograms</option>
        </optgroup>
        <optgroup label="Temperature">
          <option value="cToF">Celsius &rarr; Fahrenheit</option>
          <option value="fToC">Fahrenheit &rarr; Celsius</option>
        </optgroup>
      </select>
    </div>
    <div class="form-group">
      <label for="value">Value</label>
      <input id="value" name="value" type="text" placeholder="e.g. 5.0" required />
    </div>
    <button type="submit">Convert</button>
  </form>

  <div id="result"></div>
  <div id="error"></div>
</div>

<script>
  document.getElementById('converterForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const direction = document.getElementById('direction').value;
    const value     = document.getElementById('value').value;

    const response = await fetch('/convert', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ direction, value })
    });

    const data = await response.json();
    const resultDiv = document.getElementById('result');
    const errorDiv  = document.getElementById('error');

    if (data.error) {
      errorDiv.textContent    = 'Error: ' + data.error;
      errorDiv.style.display  = 'block';
      resultDiv.style.display = 'none';
    } else {
      resultDiv.textContent   = `${data.inputValue} ${data.fromUnit} = ${data.result} ${data.toUnit}`;
      resultDiv.style.display = 'block';
      errorDiv.style.display  = 'none';
    }
  });
</script>
</body>
</html>
